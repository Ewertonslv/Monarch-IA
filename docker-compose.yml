services:
  postgres:
    image: postgres:17-alpine
    container_name: monarch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: monarch
      POSTGRES_USER: monarch
      POSTGRES_PASSWORD: ${MONARCH_DB_PASSWORD}
    volumes:
      - monarch_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U monarch -d monarch"]
      interval: 10s
      timeout: 5s
      retries: 5

  monarch-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monarch-ai
    restart: unless-stopped
    env_file:
      - ./infra/deploy/env/monarch.env
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/monarch_ai.db
      WEB_PORT: 8000
    expose:
      - "8000"
    volumes:
      - monarch_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 10s
      retries: 5

  monarch-core:
    build:
      context: .
      dockerfile: apps/monarch-core/Dockerfile
    container_name: monarch-core
    restart: unless-stopped
    env_file:
      - ./infra/deploy/env/monarch-core.env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8010"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  whatsapp-bot:
    build:
      context: .
      dockerfile: apps/whatsapp-notion-bot/Dockerfile
    container_name: whatsapp-notion-bot
    restart: unless-stopped
    env_file:
      - ./infra/deploy/env/whatsapp.env
    expose:
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    container_name: monarch-nginx
    restart: unless-stopped
    depends_on:
      - postgres
      - monarch-ai
      - monarch-core
      - whatsapp-bot
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/deploy/nginx/templates:/etc/nginx/templates:ro
      - ./infra/deploy/nginx/entrypoint.sh:/entrypoint.sh:ro
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command: ["/bin/sh", "/entrypoint.sh"]

  certbot:
    image: certbot/certbot:latest
    container_name: monarch-certbot
    profiles: ["manual"]
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

volumes:
  monarch_data:
  monarch_postgres_data:
  certbot_webroot:
  letsencrypt:
