<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monarch AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d2e; border-bottom: 1px solid #2d3748; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; font-weight: 700; color: #a78bfa; }
    header .subtitle { font-size: 0.85rem; color: #718096; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .card { background: #1a1d2e; border: 1px solid #2d3748; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #a78bfa; }
    .input-row { display: flex; gap: 0.75rem; }
    .input-row input { flex: 1; background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 0.6rem 0.9rem; color: #e2e8f0; font-size: 0.9rem; }
    .input-row input:focus { outline: none; border-color: #a78bfa; }
    button { background: #a78bfa; color: #0f1117; border: none; border-radius: 6px; padding: 0.6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #c4b5fd; }
    button.danger { background: #f87171; }
    button.danger:hover { background: #fca5a5; }
    button.success { background: #34d399; }
    button.success:hover { background: #6ee7b7; }
    #tasks { display: flex; flex-direction: column; gap: 0.75rem; }
    .task-item { background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 1rem; }
    .task-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; margin-bottom: 0.5rem; }
    .task-id { font-size: 0.75rem; color: #718096; font-family: monospace; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge.pending { background: #2d3748; color: #a0aec0; }
    .badge.running { background: #1e40af; color: #93c5fd; }
    .badge.awaiting_approval { background: #92400e; color: #fcd34d; }
    .badge.done { background: #065f46; color: #6ee7b7; }
    .badge.failed { background: #7f1d1d; color: #fca5a5; }
    .badge.discarded { background: #374151; color: #9ca3af; }
    .task-input { font-size: 0.9rem; color: #e2e8f0; margin-bottom: 0.4rem; }
    .task-meta { font-size: 0.78rem; color: #718096; }
    .task-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .pr-link { font-size: 0.8rem; color: #a78bfa; text-decoration: none; }
    .pr-link:hover { text-decoration: underline; }
    #ws-status { font-size: 0.75rem; padding: 0.25rem 0.6rem; border-radius: 10px; }
    #ws-status.connected { background: #065f46; color: #6ee7b7; }
    #ws-status.disconnected { background: #7f1d1d; color: #fca5a5; }
  </style>
</head>
<body>
  <header>
    <h1>⚡ Monarch AI</h1>
    <span class="subtitle">Multi-agent SaaS development pipeline</span>
    <span id="ws-status" class="disconnected">● disconnected</span>
  </header>

  <main>
    <div class="card">
      <h2>New Task</h2>
      <div class="input-row">
        <input id="task-input" type="text" placeholder="Describe the feature or task…" autocomplete="off" />
        <button onclick="submitTask()">Submit</button>
      </div>
    </div>

    <div class="card">
      <h2>Active Tasks</h2>
      <div id="tasks"><p style="color:#718096;font-size:0.85rem;">Loading…</p></div>
    </div>
  </main>

<script>
const wsUrl = `ws://${location.host}/ws`;
let ws;
let tasks = {};

function connectWs() {
  ws = new WebSocket(wsUrl);
  ws.onopen = () => {
    document.getElementById("ws-status").textContent = "● connected";
    document.getElementById("ws-status").className = "connected";
  };
  ws.onclose = () => {
    document.getElementById("ws-status").textContent = "● disconnected";
    document.getElementById("ws-status").className = "disconnected";
    setTimeout(connectWs, 3000);
  };
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.type === "task_started") loadTasks();
    if (msg.type === "task_updated") { tasks[msg.task.task_id] = msg.task; render(); }
  };
}

async function loadTasks() {
  const res = await fetch("/tasks");
  const list = await res.json();
  tasks = {};
  list.forEach(t => tasks[t.task_id] = t);
  render();
}

function render() {
  const el = document.getElementById("tasks");
  const list = Object.values(tasks).sort((a, b) => b.created_at.localeCompare(a.created_at));
  if (!list.length) { el.innerHTML = '<p style="color:#718096;font-size:0.85rem;">No active tasks.</p>'; return; }
  el.innerHTML = list.map(t => `
    <div class="task-item" id="task-${t.task_id}">
      <div class="task-header">
        <span class="task-id">${t.task_id}</span>
        <span class="badge ${t.status}">${t.status.replace('_', ' ')}</span>
      </div>
      <div class="task-input">${escHtml(t.raw_input)}</div>
      <div class="task-meta">
        ${t.priority ? `Priority: <b>${t.priority}</b> &nbsp;` : ''}
        ${t.branch_name ? `Branch: <code>${escHtml(t.branch_name)}</code>` : ''}
        ${t.pr_url ? `&nbsp; <a class="pr-link" href="${escHtml(t.pr_url)}" target="_blank">View PR ↗</a>` : ''}
      </div>
      ${t.status === 'awaiting_approval' ? `
      <div class="task-actions">
        <button class="success" onclick="approve('${t.task_id}')">✓ Approve</button>
        <button class="danger" onclick="reject('${t.task_id}')">✗ Reject</button>
      </div>` : ''}
    </div>
  `).join('');
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function submitTask() {
  const input = document.getElementById("task-input");
  const val = input.value.trim();
  if (!val) return;
  input.value = "";
  await fetch("/tasks", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({raw_input: val}) });
  loadTasks();
}

document.getElementById("task-input").addEventListener("keydown", e => { if (e.key === "Enter") submitTask(); });

async function approve(taskId) {
  await fetch(`/tasks/${taskId}/approve`, {method:"POST"});
  loadTasks();
}

async function reject(taskId) {
  await fetch(`/tasks/${taskId}/reject`, {method:"POST"});
  loadTasks();
}

loadTasks();
connectWs();
</script>
</body>
</html>
